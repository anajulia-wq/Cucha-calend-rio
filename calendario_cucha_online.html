<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendário Editorial · CUCHA</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cucha-navy:#1B2A6B; --cucha-blue:#1E3A8A; --cucha-mid:#2F5BAD;
    --cucha-light:#3B82F6; --cucha-pale:#EBF2FF; --cucha-pale2:#F4F7FF;
    --bg:#F2F5FC; --surface:#FFFFFF; --surface2:#EBF0F9;
    --border:#D1DAEE; --border2:#B6C6E0;
    --text:#0F1C3F; --text2:#4A5A7A; --text3:#8A9ABB;
    --radius:8px; --radius-sm:5px;
    --shadow:0 1px 3px rgba(27,42,107,.07),0 1px 2px rgba(27,42,107,.05);
    --shadow-lg:0 4px 20px rgba(27,42,107,.13),0 1px 4px rgba(27,42,107,.07);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Poppins',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}

  /* ── TOPBAR ── */
  .app-shell{display:grid;grid-template-rows:auto 1fr;min-height:100vh}
  .topbar{background:var(--cucha-navy);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(27,42,107,.25)}
  .topbar-left{display:flex;align-items:center;gap:20px}
  .logo-img{height:30px;width:auto;filter:brightness(0) invert(1);display:block}
  .topbar-divider{width:1px;height:24px;background:rgba(255,255,255,.2)}
  .topbar-subtitle{font-size:11px;font-weight:500;color:rgba(255,255,255,.5);letter-spacing:.08em;text-transform:uppercase}
  .topbar-tabs{display:flex;gap:2px}
  .ttab{padding:7px 16px;font-size:12px;font-weight:600;border:none;background:none;color:rgba(255,255,255,.6);cursor:pointer;border-radius:var(--radius-sm);transition:background .12s,color .12s;letter-spacing:.03em;font-family:'Poppins',sans-serif}
  .ttab:hover{background:rgba(255,255,255,.1);color:#fff}
  .ttab.active{background:rgba(255,255,255,.18);color:#fff}
  .topbar-right{display:flex;align-items:center;gap:10px}
  select.client-filter{font-size:12px;font-family:'Poppins',sans-serif;font-weight:500;padding:6px 12px;border:1px solid rgba(255,255,255,.25);border-radius:var(--radius-sm);background:rgba(255,255,255,.1);color:#fff;cursor:pointer}
  select.client-filter option{background:var(--cucha-navy);color:#fff}

  /* ── STATUS BADGE ── */
  .sync-badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;display:flex;align-items:center;gap:5px;white-space:nowrap}
  .sync-ok{background:rgba(255,255,255,.15);color:rgba(255,255,255,.8)}
  .sync-saving{background:rgba(255,200,0,.2);color:#FFD700}
  .sync-err{background:rgba(255,80,80,.2);color:#FF9999}
  .sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .sync-dot.ok{background:#4ADE80}
  .sync-dot.saving{background:#FFD700;animation:pulse .8s infinite}
  .sync-dot.err{background:#FF6B6B}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  /* ── MAIN ── */
  .main-content{padding:28px;max-width:1280px;margin:0 auto;width:100%}
  .panel{display:none}.panel.active{display:block}

  /* ── CAL HEADER ── */
  .cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:12px}
  .cal-nav{display:flex;align-items:center;gap:8px}
  .cal-nav-title{font-size:20px;font-weight:700;min-width:210px;text-align:center;color:var(--text);letter-spacing:-.01em}
  .btn-nav{width:34px;height:34px;border:1.5px solid var(--border);background:var(--surface);border-radius:var(--radius-sm);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:16px;transition:all .12s;font-family:'Poppins',sans-serif}
  .btn-nav:hover{border-color:var(--cucha-mid);color:var(--cucha-mid);background:var(--cucha-pale)}

  /* ── LEGEND ── */
  .legend-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:16px}
  .legend-clients{display:flex;flex-wrap:wrap;gap:10px}
  .legend-item{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:500;color:var(--text2)}
  .legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .drag-hint{font-size:11px;color:var(--text3)}

  /* ── MONTHLY ── */
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
  .cal-day-label{text-align:center;font-size:10px;font-weight:700;color:var(--cucha-mid);padding:6px 0;text-transform:uppercase;letter-spacing:.08em}
  .cal-cell{min-height:90px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:7px;cursor:pointer;transition:all .12s;box-shadow:var(--shadow)}
  .cal-cell:hover{border-color:var(--cucha-light);box-shadow:0 2px 8px rgba(27,42,107,.08)}
  .cal-cell.empty{background:var(--surface2);border-color:transparent;cursor:default;box-shadow:none}
  .cal-cell.today{border-color:var(--cucha-mid);box-shadow:0 0 0 1.5px var(--cucha-mid)}
  .cal-cell.drag-over{border-color:#1A9970;background:#E3F5EE}
  .day-num{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:4px}
  .cal-cell.today .day-num{color:var(--cucha-mid);font-size:12px}
  .post-chip{font-size:10px;font-weight:600;border-radius:4px;padding:3px 6px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:grab;display:block;line-height:1.4;transition:opacity .12s;position:relative}
  .post-chip:active{cursor:grabbing}
  .post-chip.dragging{opacity:.3}
  .more-tag{font-size:10px;color:var(--text3);margin-top:2px;font-weight:600}

  /* ── WEEKLY ── */
  .week-nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:10px}
  .week-range-label{font-size:18px;font-weight:700;min-width:230px;text-align:center;color:var(--text);letter-spacing:-.01em}
  .week-today-btn{font-size:11px;font-weight:600;padding:5px 14px;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);border-radius:var(--radius-sm);cursor:pointer;font-family:'Poppins',sans-serif;transition:all .12s}
  .week-today-btn:hover{background:var(--cucha-pale);border-color:var(--cucha-mid);color:var(--cucha-mid)}
  .week-col-header{text-align:center;padding:12px 4px 10px}
  .week-col-dayname{font-size:10px;font-weight:700;color:var(--cucha-mid);text-transform:uppercase;letter-spacing:.08em}
  .week-col-daynum{font-size:24px;font-weight:700;color:var(--text);line-height:1.1;margin-top:3px}
  .week-col-daynum.today-num{color:var(--cucha-mid);background:var(--cucha-pale);width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;margin:4px auto 0}
  .week-col-body{min-height:260px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:8px 7px;transition:all .12s;box-shadow:var(--shadow)}
  .week-col-body.drag-over{border-color:#1A9970;background:#E3F5EE}
  .week-col-body.today-col{border-color:var(--cucha-mid);box-shadow:0 0 0 1.5px var(--cucha-mid)}
  .week-empty-col{min-height:260px;background:var(--surface2);border:1.5px dashed var(--border);border-radius:var(--radius);padding:8px;cursor:pointer;transition:all .12s}
  .week-empty-col:hover{border-color:var(--cucha-light);background:var(--cucha-pale2)}
  .week-empty-col.drag-over{border-color:#1A9970;background:#E3F5EE}
  .week-chip{font-size:11px;font-weight:600;border-radius:var(--radius-sm);padding:6px 8px;margin-bottom:6px;cursor:grab;display:block;line-height:1.4;transition:opacity .12s;border-left:3px solid transparent;position:relative}
  .week-chip:active{cursor:grabbing}
  .week-chip.dragging{opacity:.3}
  .week-chip-title{overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;word-break:break-word}
  .week-chip-meta{font-size:10px;opacity:.65;margin-top:3px;font-weight:500}

  /* ── STATUS ── */
  .sbadge{font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;white-space:nowrap;display:inline-block;letter-spacing:.02em}
  .s-pendente{background:#FFF3E2;color:#8A5000}
  .s-produzindo{background:#E6F1FB;color:#1558A0}
  .s-aprovado{background:#E6F6EE;color:#1A6B3C}
  .s-programado{background:#EEEDFC;color:#3C3489}
  .s-publicado{background:#D6F5E8;color:#0A5C3A}
  .s-atrasado{background:#FCEAEA;color:#A32020}

  /* ── LOCK ── */
  .lock-icon{position:absolute;top:2px;right:3px;font-size:9px;line-height:1;pointer-events:none}
  .chip-fixed{border:1.5px solid #D4960A!important}
  .chip-deadline{border:1.5px solid #C0392B!important}

  /* ── BUTTONS ── */
  .btn{padding:8px 18px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;transition:all .12s;font-family:'Poppins',sans-serif;letter-spacing:.02em}
  .btn-primary{background:var(--cucha-navy);color:#fff;border:none}
  .btn-primary:hover{background:var(--cucha-blue)}
  .btn-secondary{background:var(--surface);color:var(--text);border:1.5px solid var(--border)}
  .btn-secondary:hover{background:var(--cucha-pale);border-color:var(--cucha-light)}
  .btn-danger{background:none;border:1.5px solid var(--border);color:var(--text2);font-size:12px;padding:5px 10px}
  .btn-danger:hover{border-color:#E24B4A;color:#E24B4A}

  /* ── FORMS ── */
  .form-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:24px 28px;margin-bottom:16px;box-shadow:var(--shadow);max-width:700px}
  .form-card h3{font-size:14px;font-weight:700;margin-bottom:18px;color:var(--cucha-navy);letter-spacing:-.01em}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
  .form-row3{display:grid;grid-template-columns:1fr 1fr 64px;gap:14px;margin-bottom:14px}
  .form-group{display:flex;flex-direction:column;gap:5px}
  .form-group label{font-size:11px;font-weight:700;color:var(--cucha-mid);text-transform:uppercase;letter-spacing:.06em}
  .form-group input,.form-group select,.form-group textarea{padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:13px;font-family:'Poppins',sans-serif;transition:all .12s;width:100%}
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--cucha-mid);box-shadow:0 0 0 3px rgba(47,91,173,.1)}
  .form-group textarea{resize:vertical;min-height:68px}
  .color-input{height:38px;padding:3px 4px;cursor:pointer}
  .form-mb{margin-bottom:14px}

  /* ── CLIENTS ── */
  .client-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:13px 18px;margin-bottom:8px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);max-width:700px}
  .client-color-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
  .client-info{flex:1;min-width:0}
  .client-name{font-size:13px;font-weight:700;color:var(--text)}
  .client-meta{font-size:11px;color:var(--text2);margin-top:1px}
  .client-count{font-size:12px;color:var(--text3);font-weight:600;white-space:nowrap}

  /* ── MODAL ── */
  .overlay{display:none;position:fixed;inset:0;background:rgba(10,16,40,.5);z-index:200;align-items:flex-start;justify-content:center;padding:60px 16px 16px}
  .overlay.open{display:flex}
  .modal{background:var(--surface);border-radius:var(--radius);border:1.5px solid var(--border);padding:24px 28px;width:100%;max-width:480px;max-height:calc(100vh - 80px);overflow-y:auto;box-shadow:var(--shadow-lg)}
  .modal-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;gap:12px}
  .modal-header h3{font-size:15px;font-weight:700;line-height:1.3;color:var(--cucha-navy)}
  .modal-section{margin-bottom:16px}
  .modal-label{font-size:10px;font-weight:700;color:var(--cucha-mid);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
  .modal-meta{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:12px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .modal-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
  .modal-tag{font-size:11px;font-weight:600;background:var(--cucha-pale);padding:3px 10px;border-radius:20px;color:var(--cucha-mid)}
  .reschedule-row{display:flex;gap:8px;align-items:center}
  .reschedule-row input{padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:'Poppins',sans-serif;color:var(--text);background:var(--surface)}
  .reschedule-row input:focus{outline:none;border-color:var(--cucha-mid)}
  .reschedule-row input:first-child{flex:1}
  .reschedule-row input:last-of-type{width:110px}
  .modal-hint{font-size:11px;color:var(--text3);margin-top:10px;font-style:italic}

  /* ── TOAST ── */
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--cucha-navy);color:#fff;font-size:12px;font-weight:600;padding:10px 20px;border-radius:24px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:300;white-space:nowrap;box-shadow:var(--shadow-lg);font-family:'Poppins',sans-serif}
  .toast.show{opacity:1}

  /* ── LOADING SCREEN ── */
  .loading-screen{position:fixed;inset:0;background:var(--cucha-navy);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:500;gap:16px}
  .loading-screen img{height:40px;filter:brightness(0) invert(1)}
  .loading-spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{font-size:13px;color:rgba(255,255,255,.6);font-family:'Poppins',sans-serif;font-weight:500}

  @media(max-width:800px){
    .topbar{padding:10px 14px;height:auto;flex-wrap:wrap;gap:8px}
    .main-content{padding:12px}
    .form-row,.form-row3{grid-template-columns:1fr}
    .cal-grid{gap:3px}
    .cal-cell{min-height:60px;padding:4px}
    .week-col-body,.week-empty-col{min-height:140px;padding:5px}
    .week-chip{font-size:10px;padding:4px 5px}
  }
</style>
</head>

    <!-- ADD -->
    <div class="panel" id="panel-add">
      <div class="form-card">
        <h3>Novo conteúdo</h3>
        <div class="form-row">
          <div class="form-group"><label>Cliente</label><select id="post-client"><option value="">Selecione...</option></select></div>
          <div class="form-group"><label>Tipo de post</label>
            <select id="post-type"><option>Estático</option><option>Carrossel</option><option>Reels</option><option>Stories</option><option>Meta Ads</option></select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Data</label><input type="date" id="post-date"></div>

        </div>

        <div class="form-row">
          <div class="form-group"><label>Status</label>
            <select id="post-status">

            </select>
          </div>
          <div class="form-group"><label>Observações</label><input type="text" id="post-obs" placeholder="Pilar, captação..."></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Tipo de trava</label>
            <select id="post-lock-type">
              <option value="">Sem trava</option>
              <option value="fixed">📌 Data fixa</option>
              <option value="deadline">⏰ Deadline de evento</option>

<script>
// ── FIREBASE CONFIG ──────────────────────────────────────────────

// ── CONSTANTS ────────────────────────────────────────────────────

const CLIENT_PALETTE = ['#6B63D4','#1A9970','#D45A28','#C4407A','#2B7EC1','#A0781A'];
const DEFAULT_CLIENTS = [

// ── STATE ────────────────────────────────────────────────────────
let state = {
  view:'monthly', currentYear:new Date().getFullYear(), currentMonth:new Date().getMonth(),
  weekOffset:0, clients:[], posts:[], loaded:false
};

// ── UTILS ────────────────────────────────────────────────────────
function uid(){ return 'p'+Date.now().toString(36)+Math.random().toString(36).substr(2,5); }
function getClient(id){ return state.clients.find(c=>c.id===id); }
function todayStr(){
  const n=new Date();
  return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');
}
function formatDate(ds){
  const d=new Date(ds+'T12:00:00');
  return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(window._tt);
  window._tt=setTimeout(()=>t.classList.remove('show'),2400);
}

function setSyncStatus(s){
  const badge=document.getElementById('sync-badge');
  const dot=document.getElementById('sync-dot');
  const txt=document.getElementById('sync-text');
  badge.className='sync-badge sync-'+s;
  dot.className='sync-dot '+s;
  txt.textContent=s==='ok'?'Conectado':s==='saving'?'Salvando...':'Erro de conexão';
}

// ── FIREBASE REST API ────────────────────────────────────────────
async function fbGet(path){
  const r=await fetch(FB_URL+path+'.json');
  if(!r.ok) throw new Error('GET falhou');
  return r.json();
}
async function fbSet(path,data){
  const r=await fetch(FB_URL+path+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
  if(!r.ok) throw new Error('SET falhou');
  return r.json();
}
async function fbPatch(path,data){
  const r=await fetch(FB_URL+path+'.json',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
  if(!r.ok) throw new Error('PATCH falhou');
  return r.json();
}
async function fbDelete(path){
  const r=await fetch(FB_URL+path+'.json',{method:'DELETE'});
  if(!r.ok) throw new Error('DELETE falhou');
}

// ── LOAD DATA ────────────────────────────────────────────────────
async function loadAll(){
  try{
    setSyncStatus('saving');
    const data=await fbGet('');
    // Load clients — use defaults if none in DB yet
    if(data && data.clients && Object.keys(data.clients).length>0){
      state.clients=Object.values(data.clients);
    } else {
      state.clients=[...DEFAULT_CLIENTS];
      await fbSet('/clients', Object.fromEntries(DEFAULT_CLIENTS.map(c=>[c.id,c])));
    }
    // Load posts
    state.posts = data && data.posts ? Object.values(data.posts) : [];
    setSyncStatus('ok');
  } catch(e){
    setSyncStatus('err');
    // Fallback to defaults offline
    state.clients=[...DEFAULT_CLIENTS]; state.posts=[];
    showToast('⚠️ Sem conexão — modo offline');
  }
  state.loaded=true;
  document.getElementById('loading-screen').style.display='none';
  populateSelects();
  renderMonthly();
  renderClients();
  // Poll for changes every 8s
  setInterval(syncPoll,8000);
}

let lastPollHash='';
async function syncPoll(){
  try{
    const data=await fbGet('');
    const newHash=JSON.stringify(data);
    if(newHash!==lastPollHash){
      lastPollHash=newHash;
      if(data && data.clients) state.clients=Object.values(data.clients);
      if(data && data.posts) state.posts=Object.values(data.posts); else state.posts=[];
      populateSelects();
      refreshView();
      renderClients();
    }
    setSyncStatus('ok');
  } catch(e){ setSyncStatus('err'); }
}

// ── SAVE HELPERS ─────────────────────────────────────────────────
async function savePost(p){
  setSyncStatus('saving');
  try{
    await fbSet('/posts/'+p.id, p);
    setSyncStatus('ok');
  } catch(e){ setSyncStatus('err'); showToast('⚠️ Erro ao salvar'); }
}
async function deletePostRemote(id){
  setSyncStatus('saving');
  try{
    await fbDelete('/posts/'+id);
    setSyncStatus('ok');
  } catch(e){ setSyncStatus('err'); showToast('⚠️ Erro ao excluir'); }
}
async function saveClient(c){
  setSyncStatus('saving');
  try{
    await fbSet('/clients/'+c.id, c);
    setSyncStatus('ok');
  } catch(e){ setSyncStatus('err'); showToast('⚠️ Erro ao salvar cliente'); }
}
async function deleteClientRemote(id){
  setSyncStatus('saving');
  try{
    await fbDelete('/clients/'+id);
    setSyncStatus('ok');
  } catch(e){ setSyncStatus('err'); }
}

// ── NAVIGATION ───────────────────────────────────────────────────
function switchTab(t){
  ['monthly','weekly','add','clients'].forEach((id,i)=>{
    document.getElementById('panel-'+id).classList.toggle('active',id===t);
    document.querySelectorAll('.ttab')[i].classList.toggle('active',id===t);
  });
  state.view=t;
  if(t==='monthly') renderMonthly();
  if(t==='weekly')  renderWeekly();
  if(t==='clients') renderClients();
}
function refreshView(){
  if(state.view==='monthly') renderMonthly();
  if(state.view==='weekly')  renderWeekly();
}
function changeMonth(d){
  state.currentMonth+=d;
  if(state.currentMonth>11){state.currentMonth=0;state.currentYear++;}
  if(state.currentMonth<0){state.currentMonth=11;state.currentYear--;}
  renderMonthly();
}
function goToday(){
  const n=new Date(); state.currentYear=n.getFullYear(); state.currentMonth=n.getMonth();
  renderMonthly();
}
function changeWeek(d){state.weekOffset+=d; renderWeekly();}
function goTodayWeek(){state.weekOffset=0; renderWeekly();}

function populateSelects(){
  const opts=state.clients.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
  ['post-client','filter-client'].forEach(id=>{
    const el=document.getElementById(id); if(!el) return;
    const prev=el.value;
    el.innerHTML=(id==='filter-client'?'<option value="">Todos os clientes</option>':'')+opts;
    el.value=prev;
  });
}

// ── DRAG & DROP ──────────────────────────────────────────────────
function setupDrop(el,ds){
  el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('drag-over');});
  el.addEventListener('dragleave',()=>el.classList.remove('drag-over'));
  el.addEventListener('drop',e=>{
    e.preventDefault();el.classList.remove('drag-over');
    movePost(e.dataTransfer.getData('text/plain'),ds);
  });
}
function makeChipBase(p,cls){
  const cl=getClient(p.clientId); if(!cl) return null;
  const chip=document.createElement('div');
  chip.className=cls;
  chip.style.background=cl.color+'1E'; chip.style.color=cl.color;
  if(cls==='post-chip') chip.style.border='1px solid '+cl.color+'44';
  if(cls==='week-chip') chip.style.borderLeftColor=cl.color;
  if(p.lockType==='fixed')    chip.classList.add('chip-fixed');
  if(p.lockType==='deadline') chip.classList.add('chip-deadline');
  chip.draggable=true;
  chip.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',p.id);chip.classList.add('dragging');});
  chip.addEventListener('dragend',()=>chip.classList.remove('dragging'));
  chip.addEventListener('click',e=>{e.stopPropagation();openModal(p.id);});
  if(p.lockType){
    const icon=document.createElement('span');
    icon.className='lock-icon';
    icon.title=p.lockReason||'';
    icon.textContent=p.lockType==='fixed'?'📌':'⏰';
    chip.appendChild(icon);
  }
  return chip;
}
async function movePost(pid,newDate){
  const p=state.posts.find(x=>x.id===pid);
  if(!p||p.date===newDate) return;
  const cl=getClient(p.clientId);
  if(p.lockType==='fixed'){showToast('📌 Data fixa — '+(p.lockReason||'não pode ser remanejada'));return;}
  if(p.lockType==='deadline'&&p.lockDeadline&&newDate>p.lockDeadline){
    showToast('⏰ Não pode sair após '+formatDate(p.lockDeadline));return;
  }
  const d=new Date(newDate+'T12:00:00'); const dow=d.getDay();
  if(cl&&cl.restrictDays&&cl.restrictDays.includes(dow)){
    const dn=['domingo','segunda','terça','quarta','quinta','sexta','sábado'];
    if(!confirm(cl.name+' não opera às '+dn[dow]+'s. Mover assim mesmo?')) return;
  }
  p.date=newDate;
  refreshView();
  await savePost(p);
  showToast((cl?cl.name:'Post')+' → '+DAYS_PT[d.getDay()]+', '+String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0'));
}

// ── MONTHLY RENDER ───────────────────────────────────────────────
function renderMonthly(){
  if(!state.loaded) return;
  populateSelects();
  const y=state.currentYear,m=state.currentMonth;
  document.getElementById('cal-title-monthly').textContent=MONTHS_PT[m]+' '+y;
  const filter=document.getElementById('filter-client').value;
  const today=todayStr();
  document.getElementById('legend-monthly').innerHTML=
    state.clients.map(c=>`<div class="legend-item"><div class="legend-dot" style="background:${c.color}"></div>${c.name}</div>`).join('');
  const grid=document.getElementById('cal-grid-monthly');
  while(grid.children.length>7) grid.removeChild(grid.lastChild);
  const firstDay=new Date(y,m,1).getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  for(let i=0;i<firstDay;i++){const e=document.createElement('div');e.className='cal-cell empty';grid.appendChild(e);}
  for(let d=1;d<=daysInMonth;d++){
    const ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const dayPosts=state.posts.filter(p=>p.date===ds&&(!filter||p.clientId===filter)).sort((a,b)=>a.time>b.time?1:-1);
    const isToday=ds===today;
    const cell=document.createElement('div');
    cell.className='cal-cell'+(isToday?' today':'');
    setupDrop(cell,ds);
    const num=document.createElement('div');num.className='day-num';num.textContent=d;cell.appendChild(num);
    dayPosts.slice(0,2).forEach(p=>{
      const chip=makeChipBase(p,'post-chip'); if(!chip) return;
      chip.textContent=p.title; chip.title=(getClient(p.clientId)||{}).name+' — '+p.title;
      if(p.lockType){const icon=document.createElement('span');icon.className='lock-icon';icon.textContent=p.lockType==='fixed'?'📌':'⏰';chip.appendChild(icon);}
      cell.appendChild(chip);
    });
    if(dayPosts.length>2){const m2=document.createElement('div');m2.className='more-tag';m2.textContent='+'+(dayPosts.length-2)+' mais';cell.appendChild(m2);}
    if(dayPosts.length===0) cell.onclick=()=>{document.getElementById('post-date').value=ds;switchTab('add');};
    grid.appendChild(cell);
  }
}

// ── WEEKLY RENDER ────────────────────────────────────────────────
function getWeekDates(){
  const now=new Date(),dow=now.getDay(),sun=new Date(now);
  sun.setDate(now.getDate()-dow+(state.weekOffset*7));
  return Array.from({length:7},(_,i)=>{
    const d=new Date(sun);d.setDate(sun.getDate()+i);
    const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    return {date:d,ds};
  });
}
function renderWeekly(){
  if(!state.loaded) return;
  populateSelects();
  const filter=document.getElementById('filter-client').value;
  const today=todayStr(),days=getWeekDates();
  const fmt=d=>String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0');
  const last=days[6].date;
  document.getElementById('cal-title-weekly').textContent=fmt(days[0].date)+' – '+fmt(last)+' de '+MONTHS_PT[last.getMonth()]+' '+last.getFullYear();
  document.getElementById('legend-weekly').innerHTML=
    state.clients.map(c=>`<div class="legend-item"><div class="legend-dot" style="background:${c.color}"></div>${c.name}</div>`).join('');
  const container=document.getElementById('week-grid-container');
  container.innerHTML='';
  days.forEach(({date,ds})=>{
    const isToday=ds===today;
    const dayPosts=state.posts.filter(p=>p.date===ds&&(!filter||p.clientId===filter)).sort((a,b)=>a.time>b.time?1:-1);
    const col=document.createElement('div');
    col.style.cssText='display:flex;flex-direction:column;min-width:0;';
    const hdr=document.createElement('div');hdr.className='week-col-header';
    const numHtml=isToday?`<div class="week-col-daynum today-num">${date.getDate()}</div>`:`<div class="week-col-daynum">${date.getDate()}</div>`;
    hdr.innerHTML=`<div class="week-col-dayname">${DAYS_PT[date.getDay()]}</div>`+numHtml;
    col.appendChild(hdr);
    const body=document.createElement('div');body.style.cssText='flex:1;';
    if(dayPosts.length===0){
      body.className='week-empty-col'+(isToday?' today-col':'');
      body.onclick=()=>{document.getElementById('post-date').value=ds;switchTab('add');};
    } else {
      body.className='week-col-body'+(isToday?' today-col':'');
    }
    setupDrop(body,ds);
    dayPosts.forEach(p=>{
      const cl=getClient(p.clientId);if(!cl) return;
      const chip=makeChipBase(p,'week-chip');if(!chip) return;
      chip.innerHTML=`<div class="week-chip-title">${p.title}</div><div class="week-chip-meta">${p.type}${p.time?' · '+p.time:''} · <span class="sbadge s-${p.status}" style="font-size:9px;padding:1px 6px">${p.status}</span></div>`;
      body.appendChild(chip);
    });
    col.appendChild(body);container.appendChild(col);
  });
}

// ── MODAL ────────────────────────────────────────────────────────
function openModal(id){
  const p=state.posts.find(x=>x.id===id);if(!p) return;
  const cl=getClient(p.clientId);
  const d=new Date(p.date+'T12:00:00');
  document.getElementById('modal-title-text').textContent=p.title;
  const statusOpts=STATUS_CYCLE.map(s=>`<option value="${s}" ${p.status===s?'selected':''}>${s}</option>`).join('');
  document.getElementById('modal-body').innerHTML=`
    <div class="modal-meta">
      <div class="legend-dot" style="background:${cl?cl.color:'#888'};width:10px;height:10px;border-radius:50%;flex-shrink:0"></div>
      <span style="font-weight:600">${cl?cl.name:'?'}</span>
      <span style="color:var(--text3)">·</span>
      <span>${DAYS_PT[d.getDay()]}, ${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}${p.time?' · '+p.time:''}</span>
    </div>
    <div class="modal-tags">
      <span class="modal-tag">${p.type}</span>
      ${p.obs?`<span class="modal-tag">${p.obs}</span>`:''}
      ${p.lockType==='fixed'?'<span class="modal-tag" style="background:#FEF3C7;color:#92400E">📌 Data fixa</span>':''}
      ${p.lockType==='deadline'?`<span class="modal-tag" style="background:#FEE2E2;color:#991B1B">⏰ Deadline: ${p.lockDeadline?formatDate(p.lockDeadline):''}</span>`:''}
    </div>
    <div class="modal-section">
      <div class="modal-label">Status</div>
      <select id="modal-status" onchange="changeStatus('${p.id}',this.value)"
        style="padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:'Poppins',sans-serif;font-weight:500;width:100%;background:var(--surface);color:var(--text)">
        ${statusOpts}
      </select>
    </div>
    <div class="modal-section">
      <div class="modal-label">Reagendar para</div>
      <div class="reschedule-row">
        <input type="date" id="reschedule-date" value="${p.date}">
        <input type="time" id="reschedule-time" value="${p.time||''}" style="width:110px">
        <button class="btn btn-primary" style="white-space:nowrap;font-size:12px;padding:7px 14px" onclick="reschedulePost('${p.id}')">Salvar</button>
      </div>
    </div>
    <p class="modal-hint">↕ Dica: arraste o post direto no calendário para mover mais rápido.</p>
    <div style="margin-top:16px"><button class="btn btn-danger" onclick="deletePost('${p.id}')">🗑 Excluir post</button></div>`;
  document.getElementById('post-modal').classList.add('open');
}
function closeModal(){document.getElementById('post-modal').classList.remove('open');}
function handleOverlayClick(e){if(e.target===document.getElementById('post-modal')) closeModal();}

async function changeStatus(id,val){
  const p=state.posts.find(x=>x.id===id);if(!p) return;
  p.status=val; refreshView(); await savePost(p);
}
async function reschedulePost(id){
  const p=state.posts.find(x=>x.id===id);if(!p) return;
  const nd=document.getElementById('reschedule-date').value;
  const nt=document.getElementById('reschedule-time').value;
  if(!nd) return;
  const cl=getClient(p.clientId);
  p.date=nd;p.time=nt;
  closeModal();refreshView();
  await savePost(p);
  const dv=new Date(nd+'T12:00:00');
  showToast((cl?cl.name:'')+' → '+DAYS_PT[dv.getDay()]+', '+String(dv.getDate()).padStart(2,'0')+'/'+String(dv.getMonth()+1).padStart(2,'0'));
}
async function deletePost(id){
  if(!confirm('Excluir este post?')) return;
  state.posts=state.posts.filter(p=>p.id!==id);
  closeModal();refreshView();
  await deletePostRemote(id);
}

// ── ADD POST ─────────────────────────────────────────────────────
async function addPost(){
  const clientId=document.getElementById('post-client').value;
  const date=document.getElementById('post-date').value;
  const title=document.getElementById('post-title').value.trim();
  if(!clientId||!date||!title){alert('Preencha cliente, data e título.');return;}
  const p={
    id:uid(),clientId,date,
    type:document.getElementById('post-type').value,title,
    status:document.getElementById('post-status').value,
    time:document.getElementById('post-time').value,
    obs:document.getElementById('post-obs').value,
    lockType:document.getElementById('post-lock-type').value||null,
    lockDeadline:document.getElementById('post-lock-deadline').value||null,
    lockReason:document.getElementById('post-lock-reason').value||null,
  };
  state.posts.push(p);
  document.getElementById('post-title').value='';document.getElementById('post-obs').value='';
  document.getElementById('post-lock-type').value='';document.getElementById('post-lock-deadline').value='';document.getElementById('post-lock-reason').value='';
  showToast('Post adicionado!');
  switchTab(state.view==='weekly'?'weekly':'monthly');
  await savePost(p);
}

function findOrCreateClient(name){
  let cl=state.clients.find(c=>c.name.toLowerCase()===name.toLowerCase());
  if(!cl){cl={id:uid(),name,color:CLIENT_PALETTE[state.clients.length%CLIENT_PALETTE.length],niche:'',days:'',time:'08:00',restrictDays:[]};state.clients.push(cl);}
  return cl;
}
async function bulkImport(){
  const raw=document.getElementById('bulk-input').value;if(!raw.trim()) return;
  let added=0,skipped=0;
  const newPosts=[];
  raw.trim().split('\n').forEach(line=>{
    const parts=line.split('|').map(s=>s.trim());if(parts.length<4){skipped++;return;}
    const [cname,dateRaw,type,...rest]=parts;const title=rest.join(' | ');
    const dm=dateRaw.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
    if(!cname||!dm||!title){skipped++;return;}
    const cl=findOrCreateClient(cname);
    const [,dv,mo,y]=dm;const date=y+'-'+mo.padStart(2,'0')+'-'+dv.padStart(2,'0');
    const p={id:uid(),clientId:cl.id,date,type,title,status:'pendente',time:cl.time||'08:00',obs:'',lockType:null,lockDeadline:null,lockReason:null};
    state.posts.push(p);newPosts.push(p);added++;
  });
  document.getElementById('bulk-input').value='';
  showToast(added+' post(s) importado(s)'+(skipped?' · '+skipped+' ignorado(s)':''));
  switchTab('monthly');
  for(const p of newPosts) await savePost(p);
  populateSelects();
}

// ── CLIENTS ──────────────────────────────────────────────────────
async function addClient(){
  const name=document.getElementById('cl-name').value.trim();
  if(!name){alert('Informe o nome.');return;}
  if(state.clients.find(c=>c.name.toLowerCase()===name.toLowerCase())){alert('Cliente já existe.');return;}
  const c={id:uid(),name,color:document.getElementById('cl-color').value,niche:document.getElementById('cl-niche').value,days:document.getElementById('cl-days').value,time:document.getElementById('cl-time').value||'08:00',restrictDays:[]};
  state.clients.push(c);
  document.getElementById('cl-name').value='';document.getElementById('cl-niche').value='';document.getElementById('cl-days').value='';
  renderClients();populateSelects();
  await saveClient(c);
}
async function deleteClient(id){
  if(!confirm('Excluir cliente e todos os seus posts?')) return;
  const postsToDelete=state.posts.filter(p=>p.clientId===id);
  state.clients=state.clients.filter(c=>c.id!==id);
  state.posts=state.posts.filter(p=>p.clientId!==id);
  renderClients();populateSelects();refreshView();
  await deleteClientRemote(id);
  for(const p of postsToDelete) await deletePostRemote(p.id);
}
function renderClients(){
  const el=document.getElementById('clients-list');
  if(!state.clients.length){el.innerHTML='<p style="font-size:13px;color:var(--text2)">Nenhum cliente cadastrado.</p>';return;}
  el.innerHTML=state.clients.map(c=>`
    <div class="client-card">
      <div class="client-color-dot" style="background:${c.color}"></div>
      <div class="client-info">
        <div class="client-name">${c.name}</div>
        <div class="client-meta">${c.niche||'Sem nicho definido'}${c.days?' · '+c.days:''}${c.time?' · '+c.time:''}</div>
      </div>
      <div class="client-count">${state.posts.filter(p=>p.clientId===c.id).length} posts</div>
      <button class="btn btn-danger" onclick="deleteClient('${c.id}')">🗑</button>
    </div>`).join('');
}

// ── INIT ─────────────────────────────────────────────────────────
loadAll();
</script>
